# Force basic-auth on. This file is loaded LAST in MICRONAUT_CONFIG_FILES (see
# docker-compose-ci.yml) so these keys win over application-secrets.yml, which in CI
# may otherwise disable basic-auth and break the test credentials.
micronaut:
  security:
    enabled: true
    basic-auth:
      enabled: true

kestra:
  security:
     super-admin:
       username: root@root.com
       password: Root!1234
       tenantAdminAccess: main
  encryption:
    secret-key: LWBErwwlb/BQcxWujsm+/scPeO01cTKzvW44GbAWvII=
  kafka: 
    client:
      properties:
        bootstrap.servers: kafka:9092
  elasticsearch:
    client:
      http-hosts: http://elasticsearch:9200
  repository:
    type: elasticsearch
  storage:
    type: local
    local:
      base-path: "/app/storage"
  queue:
    type: kafka
  secret:
    type: vault
    vault:
      address: "http://vault:8200"
      password:
        user: john
        password: foo
  ee:
    tenants:
      enabled: true
