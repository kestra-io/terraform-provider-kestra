name: Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout provider
        uses: actions/checkout@v6
        with:
          path: terraform-provider-kestra

      - name: Checkout docs
        uses: kestra-io/actions/composite/checkout-and-auth@main
        with:
          gh-app-id: ${{ secrets.GH_BOT_APP_ID }}
          gh-app-private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          repository: kestra-io/docs
          path: docs
          ref: main

      - name: Transform docs for website
        run: |
          cd terraform-provider-kestra/docs/

          # Body transforms. Frontmatter is handled by the script further down.
          find . -type f -name "*.md" -exec sed -i 's/```terraform/```hcl/g' {} +

          # Rewrite the generated H1 to the site's heading style.
          find resources -type f -name "*.md" -exec sed -Ei 's/^# (kestra_[a-z_]+) \(Resource\)$/## Terraform Resource: \1/g' {} +
          find data-sources -type f -name "*.md" -exec sed -Ei 's/^# (kestra_[a-z_]+) \(Data Source\)$/## Terraform Data Source: \1/g' {} +

          # Alerts: the Astro site uses ::: (3 colons), not :: (2 colons).
          find . -type f -name "*.md" -exec sed -Ei 's/^-> (.*)/:::alert{type="info"}\n\1\n:::/g' {} +
          find . -type f -name "*.md" -exec sed -Ei 's/^~> (.*)/:::alert{type="warning"}\n\1\n:::/g' {} +
          find . -type f -name "*.md" -exec sed -Ei 's/^!> (.*)/:::alert{type="danger"}\n\1\n:::/g' {} +

          sed -Ei 's/^# kestra Provider/## Provider configurations/g' index.md
          mv index.md guides/configurations.md

          # The Astro site routes on a nested layout (resources/flow/index.md),
          # not flat files (resources/flow.md). Convert before copying.
          for f in $(find data-sources resources guides -type f -name '*.md'); do
            dir="${f%.md}"
            mkdir -p "$dir"
            mv "$f" "$dir/index.md"
          done

          # Frontmatter is website-owned (SEO title/h1/description), the body is
          # generated. Keep existing pages' frontmatter and refresh only their
          # body; give new pages SEO frontmatter generated by convention.
          python3 ../scripts/docs_frontmatter.py ../../docs/src/contents/docs/13.terraform

          mkdir -p ../../docs/src/contents/docs/13.terraform/
          cp -R * ../../docs/src/contents/docs/13.terraform/

      - name: Push change to docs
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "feat(docs): update terraform docs"
          branch: main
          file_pattern: 'src/contents/docs/13.terraform/*'
          repository: "docs"
          pull_before_commit: true

      - name: Slack - Notify CI failure
        if: failure()
        uses: kestra-io/actions/composite/slack-status@main
        with:
          channel: 'C09FE0QCN2E'
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          users-map: ${{ vars.GITHUB_TO_SLACK_MAP }}
