name: Slack routing ping (TEMPORARY)

# Throwaway workflow to verify Slack routing for the slack-notifications work.
# Confirms SLACK_WEBHOOK_URL resolves on this repo and that the org slack-status
# composite routes to #_int_alert-plugins-build (C09FE0QCN2E).
# DELETE this file before merging.

on:
  workflow_dispatch: {}
  push:
    branches:
      - ci/slack-notifications

permissions:
  contents: read

jobs:
  ping:
    name: Slack routing ping
    runs-on: ubuntu-latest
    steps:
      - name: Check secret presence (no values printed)
        env:
          W: ${{ secrets.SLACK_WEBHOOK_URL }}
          R: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
        run: |
          [ -n "$W" ] && echo "SLACK_WEBHOOK_URL: set" || echo "SLACK_WEBHOOK_URL: EMPTY"
          [ -n "$R" ] && echo "SLACK_RELEASES_WEBHOOK_URL: set" || echo "SLACK_RELEASES_WEBHOOK_URL: EMPTY"

      - name: Post test ping
        if: always()
        uses: kestra-io/actions/composite/slack-status@main
        with:
          channel: "C09FE0QCN2E"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          suffix: routing test (terraform-provider-kestra) — please ignore
          extra-text: "verifying #_int_alert-plugins-build routing for PR #258; safe to ignore"
