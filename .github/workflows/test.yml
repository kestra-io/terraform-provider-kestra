name: Tests
on:
  workflow_call:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    paths-ignore:
      - 'README.md'
    branches:
      - main
      - 'releases/**'
  # schedule:
  #   - cron: '0 13 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  list-versions:
    name: List Compatible Kestra Versions
    uses: ./.github/workflows/list-versions.yml

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
        id: go

      - name: Get dependencies
        run: |
          go mod download

      - name: Build
        run: |
          go build -v .

  docs:
    name: Docs up to date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Generate docs
        run: go generate ./...

      - name: Fail if docs are out of date
        run: |
          git add -N .
          git diff --exit-code || {
            echo "::error::Generated docs/examples are out of date. Run 'go generate' and commit the result."
            exit 1
          }

  test:
    name: Matrix Test
    needs: [build, list-versions]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - '1.8.5'
          - '1.9.8'
          - '1.10.5'
          - '1.12.2'
        kestraVersion: ${{ fromJSON(needs.list-versions.outputs.versions) }}

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}



      - name: Build the docker-compose stack
        env:
          APPLICATION_SECRETS: ${{ secrets.APPLICATION_SECRETS }}
        run: |
          echo $APPLICATION_SECRETS | base64 -d > .github/docker/application-secrets.yml

          sh init-tests-env.sh ${{ matrix.kestraVersion }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
        id: go

      - name: Get dependencies
        run: |
          go mod download

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - name: Terraform acceptance tests
        continue-on-error: ${{ matrix.kestraVersion == 'develop' }}
        timeout-minutes: 10
        env:
          TF_ACC: "1"
          KESTRA_URL: "http://127.27.27.27:8080"
          KESTRA_USERNAME: root@root.com
          KESTRA_PASSWORD: Root!1234
        run: |
          go test -v -cover ./internal/...

      - name: Terraform E2E tests
        continue-on-error: ${{ matrix.kestraVersion == 'develop' }}
        timeout-minutes: 10
        env:
          TF_ACC: "1"
          KESTRA_URL: "http://127.27.27.27:8080"
          KESTRA_USERNAME: root@root.com
          KESTRA_PASSWORD: Root!1234
        run: |
          sh e2e-test.sh

  notify-failure:
    name: Notify CI failure
    needs: [list-versions, build, docs, test]
    if: always() && github.event_name != 'pull_request' && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Collect failed jobs
        id: failed
        run: |
          failed=""
          [ "${{ needs.list-versions.result }}" = "failure" ] && failed="$failed list-versions"
          [ "${{ needs.build.result }}" = "failure" ] && failed="$failed build"
          [ "${{ needs.docs.result }}" = "failure" ] && failed="$failed docs"
          [ "${{ needs.test.result }}" = "failure" ] && failed="$failed test"
          echo "list=${failed# }" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Slack - Notify CI failure
        if: always()
        uses: kestra-io/actions/composite/slack-status@main
        with:
          channel: 'C09FE0QCN2E'
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          users-map: ${{ vars.GITHUB_TO_SLACK_MAP }}
          extra-text: 'Failed jobs: ${{ steps.failed.outputs.list }}'
